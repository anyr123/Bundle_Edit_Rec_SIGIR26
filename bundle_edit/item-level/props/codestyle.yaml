delete_prompt: |
  # Task: Semantic Bundle Product Recommendation - DELETE Operation
  # Goal: As a senior recommendation system expert, please understand the semantic relationships and themes within product bundles.
  # Your task is to identify and remove the item that least fits the bundle's semantic theme.
  # Please provide the final result directly, with no explanations.

  class Item:
      'The smallest entity unit in the bundle recommendation scene; an item belongs to the bundle.'
      def __init__(self, ID, Title):
          self.ID = ID
          self.Title = Title

  class Bundle:
      "A grouped collection of semantically related items, such as fashion products."
      def __init__(self, Item_Set):
          self.Item_Set = Item_Set
          
      def delete(self):
          """
          Please strictly follow these semantic reasoning steps to complete this method:
          1. First, deeply analyze the semantic content of all items in the Item_Set (e.g., style, category, gender, usage, function, material, etc.) to fully understand its overall topic or theme.
          2. Next, for each item in the Item_Set, perform a detailed evaluation of how well it aligns with the bundle's dominant semantic theme and identify semantic inconsistencies.
          3. Finally, select and return the single Item that is most semantically inconsistent with the bundle's overall topic or theme.
          """
          return [output]

  # Instantiated Data
  current_bundle = Bundle([{bundle_lines}])
  result = current_bundle.delete()  # This will return the item to be removed
  
  # Instructions
  1. The operation type is DELETE.
  2. Apply the operation to produce the final bundle.

  # Required Output Format
  Removed item: Item(ID, "Title")

