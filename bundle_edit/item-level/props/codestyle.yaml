update_prompt: |
  # Task: Semantic Bundle Product Recommendation - UPDATE Operation
  # Goal: As a senior recommendation system expert, please perform a two-phase update operation.
  # Phase 1: DELETE - Remove the least fitting item from the bundle
  # Phase 2: ADD - Select the most suitable candidate to replace it
  # Please provide the final result directly, with no explanations.

  ## PHASE 1: DELETE Operation
  # Current Bundle Items:
  {bundle_lines}

  # DELETE Task: Identify the item that least fits the bundle's semantic theme
  # Analyze the semantic content of all items (style, category, gender, usage, function, material, etc.)
  # Select the item that is most semantically inconsistent with the bundle's overall theme

  class Item:
      'The smallest entity unit in the bundle recommendation scene; an item belongs to the bundle.'
      def __init__(self, ID, Title):
          self.ID = ID
          self.Title = Title

  class Bundle:
      "A grouped collection of semantically related items, such as fashion products."
      def __init__(self, Item_Set):
          self.Item_Set = Item_Set
          
      def delete(self):
          """
          Analyze semantic content and identify the most inconsistent item:
          1. Understand the bundle's overall topic or theme
          2. Evaluate each item's alignment with the dominant theme
          3. Return the item that is most semantically inconsistent
          """
          return [output]

  current_bundle = Bundle([{bundle_lines}])
  removed_item = current_bundle.delete()

  ## PHASE 2: ADD Operation  
  # Remaining Bundle Items (after removing the inconsistent item):
  # [Items will be determined after Phase 1]

  # Candidate Products:
  {cand_lines}

  # ADD Task: Select the most suitable candidate to complement the refined bundle
  class Candidate:
      def __init__(self, refined_bundle, Item_Set):
          self.refined_bundle = refined_bundle
          self.Item_Set = Item_Set
          
      def add(self):
          """
          Select the best candidate for the refined bundle:
          1. Analyze the refined bundle's semantic theme (after deletion)
          2. Evaluate each candidate's complementarity with remaining items
          3. Select the candidate that best enhances semantic coherence
          4. Return the single Item that best completes the bundle
          """
          return [output]

  # After Phase 1 deletion, evaluate candidates for the refined bundle
  candidate_items = [{cand_lines}]
  candidate = Candidate(refined_bundle, candidate_items)
  selected_item = candidate.add()

  # Instructions
  1. The operation type is UPDATE (DELETE then ADD).
  2. First, complete Phase 1: Identify and remove the most semantically inconsistent item.
  3. Then, complete Phase 2: Select the most suitable candidate for the refined bundle.
  4. Both phases should consider semantic consistency and bundle coherence.

  # Required Output Format
  Removed item: Item(ID, "Title")
  Selected item: Item(ID, "Title")

update_prompt_enhanced: |
  # Task: Semantic Bundle Product Recommendation - UPDATE Operation (Enhanced with NBR & Topic)
  # Goal: Perform a two-phase update operation with enhanced semantic analysis
  # Phase 1: DELETE - Remove the least fitting item from the bundle
  # Phase 2: ADD - Select the most suitable candidate using NBR and Topic analysis

  ## PHASE 1: DELETE Operation
  # Current Bundle Items:
  {bundle_lines}

  # Bundle Topic Analysis:
  {topic}

  # DELETE Task: Identify the item that least fits the bundle's semantic theme
  # Consider the bundle topic: "{topic}"
  # Analyze semantic content (style, category, gender, usage, function, material, etc.)
  # Select the item most inconsistent with both the bundle theme and stated topic

  class Item:
      def __init__(self, ID, Title):
          self.ID = ID
          self.Title = Title

  class Bundle:
      def __init__(self, Item_Set):
          self.Item_Set = Item_Set
          
      def delete(self):
          """
          Phase 1 - Enhanced DELETE with Topic Analysis:
          1. Understand bundle's theme considering the topic: "{topic}"
          2. Evaluate each item's alignment with both theme and topic
          3. Return the item most semantically inconsistent
          """
          return [output]

  current_bundle = Bundle([{bundle_lines}])
  removed_item = current_bundle.delete()

  ## PHASE 2: ADD Operation (Enhanced with NBR & Topic)
  # NBR - Similar Bundles for Reference:
  {nbr_context}

  # Candidate Products:
  {cand_lines}

  # ADD Task: Select the most suitable candidate using comprehensive analysis
  class Candidate:
      def __init__(self, refined_bundle, Item_Set):
          self.refined_bundle = refined_bundle
          self.Item_Set = Item_Set
          
      def add(self):
          """
          Phase 2 - Enhanced ADD with NBR and Topic:
          1. Analyze refined bundle theme (after deletion) considering topic
          2. Examine NBR patterns from similar bundles
          3. Evaluate each candidate's fit with:
             - Refined bundle semantic coherence
             - Bundle topic alignment: "{topic}"
             - Patterns from similar bundles (NBR context)
          4. Select candidate that best enhances overall bundle quality
          """
          return [output]

  # Enhanced Selection Criteria for Phase 2:
  # - Best matches patterns from similar NBR bundles
  # - Aligns with bundle topic: "{topic}"
  # - Creates semantic coherence with remaining items
  # - Would be most likely purchased together with existing items

  candidate_items = [{cand_lines}]
  candidate = Candidate(refined_bundle, candidate_items)
  selected_item = candidate.add()

  # Instructions
  1. Complete Phase 1: Remove item considering bundle topic
  2. Complete Phase 2: Add candidate using NBR patterns and topic analysis
  3. Both phases should optimize for semantic consistency and purchase likelihood

  # Required Output Format
  Removed item: Item(ID, "Title")
  Selected item: Item(ID, "Title")