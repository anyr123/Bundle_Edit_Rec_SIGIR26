add_prompt: |
  # Task: Semantic Bundle Product Recommendation - ADD Operation
  # Goal: As a senior recommendation system expert, please understand the semantic relationships and themes within product bundles.
  # Your task is to select the most suitable item from candidates that best complements the bundle's theme.
  # Please provide the final result directly, with no explanations.

  class Item:
      'The smallest entity unit in the bundle recommendation scene; an item belongs to the bundle.'
      def __init__(self, ID, Title):
          self.ID = ID
          self.Title = Title

  class Bundle:
      "A grouped collection of semantically related items, such as fashion products."
      def __init__(self, Item_Set):
          self.Item_Set = Item_Set

  class Candidate:
      def __init__(self, current_bundle, Item_Set):
          self.current_bundle = current_bundle
          self.Item_Set = Item_Set
          
      def add(self):
          """
          Please follow these semantic reasoning steps to complete this method:
          1. Analyze the semantic content of all items in the current_bundle 
               (style, category, gender, usage, function, material, etc.) 
               to infer its overall topic or theme.
            2. Incorporate retrieved neighbor bundles (NBR context) to refine 
               the understanding of possible bundle topic and strengthen reasoning.
            3. Compare each candidate item against the bundle's theme and neighbor 
               context to evaluate semantic relevance and complementarity.
            4. Return the single Item that best completes the bundle.
  """
          return [output]

  # Instantiated Data
  current_bundle
   = Bundle([{bundle_lines}])
  candidate_items = [{cand_lines}]
  candidate = Candidate(current_bundle, candidate_items)
  result = candidate.add()  # This will return the selected item
  
  # Task
  Based on the above class definitions, semantic reasoning rules, and neighbor bundle context, 
  determine the single best candidate to complete the bundle.

  # Required Output Format
  Selected item: Item(ID, "Title")

add_prompt_enhanced: |

  # Task: Semantic Bundle Product Recommendation with NBR Context
  # Goal: As a senior recommendation system expert, please follow the class definitions and semantic reasoning rules below. 
  # Your task is to select the single product from the provided candidate list that best and most perfectly completes the existing bundle.

  # Class Definitions
  class Item:
      """
      The fundamental unit in bundle recommendation.
      Attributes:
          ID (str): Unique product identifier.
          Title (str): Readable product name or description.
      """

  class Bundle:
      """
      A collection of semantically related items (e.g., fashion products).
      Attributes:
          Item_Set (list[Item]): Items included in the bundle.
          Topic (str): The underlying theme or purpose of the bundle, 
                        either inferred or explicitly provided.
      """

  class Candidate:
      """
      A set of potential items to evaluate against the bundle’s topic.
      Attributes:
          current_bundle (Bundle): The reference bundle context.
          Item_Set (list[Item]): Candidate items for selection.
      Methods:
          complete():
              1. Analyze the semantic content of the current_bundle 
                (e.g., style, category, gender, usage, function, material).
              2. Incorporate explicit topic text when available.
              3. Use neighbor bundles (NBR context) to refine topic understanding 
                and strengthen reasoning.
              4. Compare each candidate item with the bundle’s inferred theme, 
                explicit topic, and neighbor context to assess semantic fit.
              5. Return the single Item that most effectively completes the bundle.
      """

  # Instantiated Data
  current_bundle = Bundle(
      Item_Set=[{bundle_lines}],
      Topic="{topic}"
  )

  # Explicit topic provided for this bundle:
  {topic}

  # Neighbor bundle sessions retrieved for semantic reference:
  {nbr_context}

  candidate_items = [{cand_lines}]
  candidate = Candidate(current_bundle, candidate_items)

  # Task Execution
  selected_item = candidate.complete()

  # Required Output Format
  Selected item: Item(ID, "Title")


